server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large uploads/streams to pass through untouched.
    client_max_body_size 0;

    # HearthShelf is a transparent front-end for an internal-only ABS server.
    # Two clients share this host: the HearthShelf SPA (prefixed /abs-api,
    # /abs-socket calls) and native ABS clients like ABSORB (raw ABS paths).
    # Routing is by path - native ABS prefixes go to ABS, everything else
    # falls through to the SPA. See docs/reverse-proxy.md.

    # --- HearthShelf SPA prefixed calls ---

    # SPA REST calls. Strip the /abs-api prefix, forward the rest verbatim.
    location /abs-api/ {
        rewrite ^/abs-api/(.*) /$1 break;
        proxy_pass ${ABS_SERVER_URL};
        include /etc/nginx/abs_proxy.conf;
    }

    # SPA socket.
    location /abs-socket/ {
        rewrite ^/abs-socket/(.*) /$1 break;
        proxy_pass ${ABS_SERVER_URL};
        include /etc/nginx/abs_proxy.conf;
    }

    # --- Native ABS paths (ABSORB / native clients) ---
    # Forwarded verbatim (no prefix strip) so a native ABS client pointed at
    # books.mydomain.com behaves exactly as if pointed at ABS directly.
    location ~ ^/(api|socket\.io|auth|public|feed|hls|s)/ {
        proxy_pass ${ABS_SERVER_URL};
        include /etc/nginx/abs_proxy.conf;
    }

    # Exact-match native ABS auth / health endpoints (no trailing path).
    location = /login {
        proxy_pass ${ABS_SERVER_URL};
        include /etc/nginx/abs_proxy.conf;
    }
    location = /logout {
        proxy_pass ${ABS_SERVER_URL};
        include /etc/nginx/abs_proxy.conf;
    }
    location = /status {
        proxy_pass ${ABS_SERVER_URL};
        include /etc/nginx/abs_proxy.conf;
    }
    location = /healthcheck {
        proxy_pass ${ABS_SERVER_URL};
        include /etc/nginx/abs_proxy.conf;
    }
    location = /ping {
        proxy_pass ${ABS_SERVER_URL};
        include /etc/nginx/abs_proxy.conf;
    }

    # --- HearthShelf SPA ---
    # Everything else serves the SPA; client-side routes fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
