# HearthShelf is the only host end users ever touch. It serves the SPA and
# transparently reverse-proxies an internal-only ABS server, so the web UI is
# "HearthShelf" and native clients (ABSORB) talk to books.mydomain.com as if it
# were ABS itself. See docs/reverse-proxy.md.
services:
  hearthshelf:
    image: hearthshelf:latest
    build: .
    ports:
      - "9277:80"
    environment:
      # Internal service name on the shared network - NOT a published host:port.
      - ABS_SERVER_URL=http://abs:13378
      - PUBLIC_URL=https://books.mydomain.com
      # QuestGiver AI recommender (optional - leave QG_PROVIDER empty to disable
      # the AI path; the heuristic recommender still works). Key stays in-container.
      - QG_PROVIDER=${QG_PROVIDER:-}
      - QG_MODEL=${QG_MODEL:-}
      - QG_API_KEY=${QG_API_KEY:-}
      - QG_BASE_URL=${QG_BASE_URL:-}
      - QG_LIMIT=${QG_LIMIT:-off}
      - QG_ENABLED=${QG_ENABLED:-true}
      - DISCOVER_ENABLED=${DISCOVER_ENABLED:-true}
      # Discover backend persistence (feedback + monthly AI shelf cache).
      - QG_DATA_DIR=/app/data
      # ReadMeABook acquisition (optional - leave RMAB_URL empty to hide request
      # UI). RMAB stays on the internal network; only HearthShelf reaches it.
      - RMAB_URL=${RMAB_URL:-}
      - RMAB_TOKEN=${RMAB_TOKEN:-}
      # Cross-user leaderboard reads ABS's SQLite read-only (see the abs-config
      # mount below). Path is where ABS's config dir lands in THIS container.
      - HS_ABS_DB_PATH=/abs-config/absdatabase.sqlite
    depends_on:
      - abs
    networks:
      - internal
    volumes:
      # Persists Discover feedback + the monthly AI shelf cache across restarts.
      - hearthshelf-data:/app/data
      # Read-only view of ABS's config dir so HearthShelf can read
      # absdatabase.sqlite for the cross-user leaderboard. ':ro' keeps it
      # read-only - HearthShelf never writes to ABS's database. Remove this line
      # (and HS_ABS_DB_PATH above) to disable the leaderboard.
      - abs-config:/abs-config:ro
    restart: unless-stopped

  abs:
    image: ghcr.io/advplyr/audiobookshelf:latest
    # NO ports: mapping - ABS is reachable only on the internal network, never
    # directly from the host or the internet. HearthShelf is its sole ingress.
    volumes:
      - abs-config:/config
      - abs-metadata:/metadata
      - abs-audiobooks:/audiobooks
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:

volumes:
  hearthshelf-data:
  abs-config:
  abs-metadata:
  abs-audiobooks:
