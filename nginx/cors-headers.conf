# Hosted-mode CORS headers for ABS-proxied locations, included inside each
# location that the cross-origin hosted SPA calls directly. $hs_cors_origin is
# set by the map in cors-map.conf: it equals the request Origin only when that
# Origin is the configured app origin, else "". When empty, add_header emits
# nothing (nginx skips add_header with an empty value), so self-hosted /
# same-origin requests are unaffected.
#
# Bearer tokens, not cookies, cross-origin -> no Allow-Credentials. The browser
# preflights PATCH/DELETE and Authorization; answer OPTIONS here with 204.

add_header Access-Control-Allow-Origin $hs_cors_origin always;
add_header Vary Origin always;
add_header Access-Control-Allow-Headers "Authorization, Content-Type, Range" always;
add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
add_header Access-Control-Max-Age 86400 always;

if ($request_method = OPTIONS) {
    return 204;
}
