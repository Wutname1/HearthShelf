# Hosted-mode CORS for the ABS-proxied locations (/api, /s, ...). The hosted SPA
# at app.hearthshelf.com calls this server cross-origin with a bearer token (no
# cookies), so the browser needs an Access-Control-Allow-Origin matching its
# origin EXACTLY - never '*'. This map echoes the request Origin back only when
# it equals the configured app origin; otherwise it is empty and the ABS
# locations add no CORS header (self-hosted / same-origin behavior unchanged).
#
# Lives at http scope (conf.d/). ${HS_APP_ORIGIN} is substituted at container
# start; empty disables cross-origin entirely.
map $http_origin $hs_cors_origin {
    default "";
    "${HS_APP_ORIGIN}" "${HS_APP_ORIGIN}";
}
