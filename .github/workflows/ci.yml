name: CI

on:
  pull_request:
  push:
    branches: [main, master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive # packages/core is a git submodule the build needs

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The build (tsc + vite) is the hard gate. Lint is informational - the
      # strict react-compiler rules surface stylistic flags, not build breaks.
      - name: Typecheck & build
        run: npm run build

      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
