name: Dev release

# Every push to the default branch publishes a fresh development image.
on:
  push:
    branches: [main, master]

concurrency:
  group: dev-release
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push :nightly (${{ matrix.variant }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # slim -> hearthshelf ; aio -> hearthshelf-aio
          - variant: slim
            target: slim
            image: ${{ github.repository }}
          - variant: aio
            target: aio
            image: ${{ github.repository }}-aio
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          # nightly (moving) + main-<shortsha> (immutable pin).
          tags: |
            type=raw,value=nightly
            type=sha,prefix=main-,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
