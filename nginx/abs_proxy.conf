# Shared proxy behavior for every ABS-bound location. Included from
# default.conf. ${ABS_SERVER_URL} / ${PUBLIC_URL} are substituted by the
# entrypoint's envsubst pass at container start. See docs/reverse-proxy.md.

# Tell ABS its public identity so it generates correct absolute URLs itself.
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Proto $scheme;

# Websocket upgrade support (ABS socket.io + SPA socket).
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# Streams can be long-lived; don't cut them off early.
proxy_buffering off;
proxy_read_timeout 3600s;
proxy_send_timeout 3600s;

# Safety net: rewrite redirects that carry the internal ABS host so the public
# origin reaches the browser / native client. Scoped to the ABS host ONLY - a
# blanket catch-all would hijack legitimate external redirects (e.g. an OIDC
# bounce to the identity provider's login page).
proxy_redirect ${ABS_SERVER_URL}/ ${PUBLIC_URL}/;
proxy_redirect default;
